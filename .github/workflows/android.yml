name: Android CI

on: [push]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v1
    - name: set up JDK 1.8
      uses: actions/setup-java@v1
      with:
        java-version: 1.8
    - name: Build with Gradle
      run: ./gradlew assembleRelease 
    - name: Make Release Directory
      run: mkdir mapcache/build/release
    - name: Copy Release Artifacts
      run: |
        ls mapcache
        ls mapcache/build
        ls mapcache/build/outputs
        ls mapcache/build/outputs/apk
        ls mapcache/build/outputs/apk/release
        cp mapcache/build/outputs/apk/release/mapcache-release.apk "mapcache/build/release/mapcache-$(./gradlew mapcache:androidAppVersion | grep versionName | sed 's/^.*@//').apk"
    - name: Upload Artifacts
      uses: actions/upload-artifact@v1
      with:
        name: mapcache
        path: mapcache/build/release
